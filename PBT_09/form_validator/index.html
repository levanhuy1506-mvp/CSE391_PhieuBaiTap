<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator Real-time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-card">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="regForm">
            <div class="form-group">
                <label for="username">Tên người dùng (2-50 ký tự)</label>
                <div class="input-wrapper">
                    <input type="text" id="username" autocomplete="off">
                    <span class="status-icon"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email">
                <div class="error-msg" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password">
                <div class="strength-container">
                    <div id="strengthBar"></div>
                </div>
                <div id="strengthText" style="font-size: 13px; font-weight: bold; margin-top:4px;"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword">
                <div class="error-msg" id="confirmError"></div>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="xxxx-xxx-xxx" maxlength="12">
            </div>

            <button type="submit" id="submitBtn" disabled>Đăng ký ngay</button>
        </form>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <h3>🎉 Đăng Ký Thành Công!</h3>
            <div id="summaryData"></div>
            <button onclick="document.getElementById('successModal').style.display='none'">Đóng</button>
        </div>
    </div>
</body>
</html>
