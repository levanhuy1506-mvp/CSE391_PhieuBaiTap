<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Box Model Lab — Content-box vs Border-box</title>
    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>

    <h1>Phần 1: Minh họa Content-box vs Border-box</h1>
    <div class="container-demo">
        <div class="box-content">Hộp 1: content-box</div>
        <div class="box-border">Hộp 2: border-box</div>
    </div>

    <hr>

    <h1>Phần 2: Layout cấu trúc hệ thống 3 cột chuẩn 1000px</h1>
    <div class="layout-container">
        <aside class="col-left">Cột trái (Sidebar)<br>Width: 250px</aside>
        <section class="col-center">Cột giữa (Content)<br>Width: 500px</section>
        <aside class="col-right">Cột phải (Ads)<br>Width: 250px</aside>
    </div>

</body>
</html>
