<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm chứng CSS Selectors — Câu A2</title>
    <style>
        /* Tô nền đỏ nhạt cho các phần tử được chọn để kiểm chứng */
        nav a:first-child { background-color: yellow; font-weight: bold; }
        .product.featured h2 { background-color: lime; }
        article > p { border: 1px dashed red; }
        .top-bar.dark h1 { color: red; }
    </style>
</head>
<body>
    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>
        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>
</body>
</html>
